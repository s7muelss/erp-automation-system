services:
  - type: web
    name: erp-automation-system
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "echo 'no build needed'"
    startCommand: "node server.js"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_ORIGIN
        value: https://erp-automation-system-eight.vercel.app
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false

