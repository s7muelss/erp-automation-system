<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ERP Automation System</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>
  <div id="app">

    <!-- ─── Sidebar ─────────────────────────────────────────────── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚙️</span>
        <div class="brand-text">
          <span class="brand-title">ERP System</span>
          <span class="brand-sub">Automation</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="#" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a href="#" class="nav-item" data-page="pedidos">
          <span class="nav-icon">📋</span> Pedidos
        </a>
        <a href="#" class="nav-item" data-page="novo">
          <span class="nav-icon">➕</span> Novo Pedido
        </a>
      </nav>
      <div class="sidebar-footer">
        <span id="api-status" class="api-badge checking">🔄 Verificando API...</span>
      </div>
    </aside>

    <!-- ─── Main ─────────────────────────────────────────────────── -->
    <main class="main-content">

      <!-- Header -->
      <header class="top-bar">
        <h1 id="page-title">Dashboard</h1>
        <div class="top-bar-actions">
          <button class="btn btn-secondary" onclick="App.refreshData()">🔄 Atualizar</button>
        </div>
      </header>

      <!-- Toast container -->
      <div id="toast-container"></div>

      <!-- ─── PÁGINA: Dashboard ────────────────────────────────── -->
      <section id="page-dashboard" class="page active">
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon pending">📬</div>
            <div class="stat-body">
              <span class="stat-value" id="stat-pendente">—</span>
              <span class="stat-label">Pendentes</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon progress">⚡</div>
            <div class="stat-body">
              <span class="stat-value" id="stat-andamento">—</span>
              <span class="stat-label">Em Andamento</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon done">✅</div>
            <div class="stat-body">
              <span class="stat-value" id="stat-concluido">—</span>
              <span class="stat-label">Concluídos</span>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon total">📦</div>
            <div class="stat-body">
              <span class="stat-value" id="stat-total">—</span>
              <span class="stat-label">Total</span>
            </div>
          </div>
        </div>

        <div class="card mt-2">
          <div class="card-header">
            <h2>Pedidos Recentes</h2>
          </div>
          <div class="card-body">
            <div id="recent-pedidos" class="pedidos-list">
              <div class="loading-spinner">Carregando...</div>
            </div>
          </div>
        </div>
      </section>

      <!-- ─── PÁGINA: Pedidos ──────────────────────────────────── -->
      <section id="page-pedidos" class="page">
        <div class="page-toolbar">
          <div class="filter-group">
            <label>Filtrar por status:</label>
            <select id="filter-status" onchange="App.filterPedidos()">
              <option value="">Todos</option>
              <option value="pendente">Pendente</option>
              <option value="em_andamento">Em Andamento</option>
              <option value="concluido">Concluído</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </div>
          <div class="filter-group">
            <label>Buscar cliente:</label>
            <input type="text" id="filter-cliente" placeholder="Nome do cliente..." oninput="App.filterPedidos()" />
          </div>
        </div>
        <div id="pedidos-container" class="pedidos-list">
          <div class="loading-spinner">Carregando...</div>
        </div>
      </section>

      <!-- ─── PÁGINA: Novo Pedido ──────────────────────────────── -->
      <section id="page-novo" class="page">
        <div class="card form-card">
          <div class="card-header"><h2>Criar Novo Pedido</h2></div>
          <div class="card-body">
            <div class="form-group">
              <label for="f-cliente">Cliente *</label>
              <input type="text" id="f-cliente" placeholder="Nome do cliente" />
            </div>
            <div class="form-group">
              <label for="f-descricao">Descrição *</label>
              <textarea id="f-descricao" rows="4" placeholder="Descreva o pedido..."></textarea>
            </div>
            <div class="form-group">
              <label for="f-prioridade">Prioridade</label>
              <select id="f-prioridade">
                <option value="baixa">Baixa</option>
                <option value="media" selected>Média</option>
                <option value="alta">Alta</option>
              </select>
            </div>
            <div class="form-group">
              <label>Itens do Pedido</label>
              <div id="itens-container">
                <div class="item-row">
                  <input type="text" placeholder="Nome do item" class="item-nome" />
                  <input type="number" placeholder="Qtd" class="item-qtd" min="1" value="1" />
                  <button class="btn-remove-item" onclick="App.removeItem(this)">✕</button>
                </div>
              </div>
              <button class="btn btn-ghost mt-1" onclick="App.addItem()">+ Adicionar item</button>
            </div>
            <div class="form-actions">
              <button class="btn btn-secondary" onclick="App.navigate('pedidos')">Cancelar</button>
              <button class="btn btn-primary" onclick="App.criarPedido()">Criar Pedido</button>
            </div>
          </div>
        </div>
      </section>

      <!-- ─── MODAL: Detalhes / Edição ─────────────────────────── -->
      <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <button class="modal-close" onclick="App.closeModal()">✕</button>
          <div id="modal-content"></div>
        </div>
      </div>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
